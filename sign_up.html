<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, 
    initial-scale=1.0">
    <title>Sign up Form</title>
    <style>
        *,
        html,
        body {
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
        }
        main {
            width: 100%;
            height: auto;
            margin: 40px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-family: Arial, sans-serif;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            border-radius: 10px;
            border: 1px solid #ccc;
            background-color: #f2f2f2;
            overflow-x: hidden;
        }
        table {
            margin: 0 auto;
            width: 100%;
            border-collapse: collapse;
            background-color: #f2f2f2;
            font-size: 18px;
            border-radius: 5px;
            border-top: 2px solid #ccc;
            border-bottom: 2px solid #ccc;
            border-left: 2px solid #ccc;
            border-right: 2px solid #ccc;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
            background-color: #fff;
        }
        table td {
            text-align: center;
            padding: 10px;
            border-bottom: 1px solid #ccc;
            font-weight: bold;
            transition: background-color 0.3s;
            color: #333;
            /* box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2); */
        }
        .box {
            width: 350px;
            padding: 5px;
            border-radius: 5px;
            background-color: #fff;
            border: 1px solid #ccc;
            box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s;
            box-sizing: border-box;
        }
        .btn {
            width: 100px;
            padding: 5px;
            border: none;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            font-size: 18px;
            border-radius: 5px;
            transition: background-color 0.3s;
            box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>
    <main>
        <form action="" method="get">
            <table border="0" cellspacing="15">
                <tr>
                    <th>Login</th>
                    <td><strong>Sign up for best food</strong></td>
                </tr>
                <tr>
                    <td><label>User Name :</label></td>
                    <td><input type="text" placeholder="Enter User Name" class="box" id="userInput"></td>
                </tr>
                <tr>
                    <td><label>Password :</label></td>
                    <td>
                        <input type="password" placeholder="Enter Your Password" class="box" id="userPassword"
                            minlength="6">
                    </td>
                </tr>
                <tr>
                    <td><label>Renter Password :</label></td>
                    <td>
                        <input type="password" placeholder="Enter Your Password" class="box" id="userPassword"
                            minlength="6">
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td><input type="submit" class="btn" onclick="valid()">
                        <input type="reset" class="btn">
                    </td>
                </tr>
            </table>
        </form>
    </main>
    <script src="script.js"></script>
</body>
