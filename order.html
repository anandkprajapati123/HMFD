<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .order-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.3);
      text-align: center;
      width: 350px;
    }
    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .btn:hover {
      background: darkgreen;
    }
  </style>
</head>
<body>
  <div class="order-box">
    <h2>Your Order</h2>
    <p id="foodName">Loading...</p>
    <button class="btn" onclick="confirmOrder()">Confirm Order</button>
  </div>

  <script>
    // Get item from URL
    const params = new URLSearchParams(window.location.search);
    const food = params.get("item");
    document.getElementById("foodName").textContent = "🍴 " + food;

    function confirmOrder() {
      alert("✅ Order Confirmed for " + food);
      window.location.href = "submit.html";
    }
  </script>
</body>
</html>
