<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      padding: 20px;
    }
    h2 {
      text-align: center;
      color: darkgreen;
    }
    table {
      width: 80%;
      margin: auto;
      border-collapse: collapse;
      background: white;
      box-shadow: 2px 4px 10px rgba(0,0,0,0.2);
    }
    th, td {
      padding: 12px;
      text-align: center;
      border: 1px solid #ccc;
    }
    th {
      background: green;
      color: white;
    }
    .btn {
      padding: 8px 12px;
      border: none;
      background: brown;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }
    .btn:hover {
      background: darkred;
    }
    .checkout {
      margin: 20px auto;
      display: flex;
      justify-content: center;
    }
    .checkout button {
      padding: 10px 20px;
      font-size: 18px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .checkout button:hover {
      background: darkgreen;
    }
  </style>
</head>
<body>
  <h2>🛒 Your Shopping Cart</h2>
  <table id="cartTable">
    <thead>
      <tr>
        <th>Item</th>
        <th>Price (₹)</th>
        <th>Quantity</th>
        <th>Total</th>
        <th>Remove</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="checkout">
    <button onclick="checkout()">Proceed to Checkout</button>
  </div>

  <script>
    function loadCart() {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      const tbody = document.querySelector("#cartTable tbody");
      tbody.innerHTML = "";

      let grandTotal = 0;

      cart.forEach((item, index) => {
        let row = document.createElement("tr");
        let total = item.price * item.quantity;
        grandTotal += total;

        row.innerHTML = `
          <td>${item.name}</td>
          <td>${item.price}</td>
          <td>${item.quantity}</td>
          <td>${total}</td>
          <td><button class="btn" onclick="removeItem(${index})">Remove</button></td>
        `;
        tbody.appendChild(row);
      });

      // Add grand total row
      let row = document.createElement("tr");
      row.innerHTML = `
        <td colspan="3"><b>Grand Total</b></td>
        <td colspan="2"><b>₹ ${grandTotal}</b></td>
      `;
      tbody.appendChild(row);
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();
    }

    function checkout() {
      alert("✅ Proceeding to Checkout...");
      window.location.href = "submit.html";
    }

    loadCart();
  </script>
</body>
</html>
